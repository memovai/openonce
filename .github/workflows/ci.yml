name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: openonce
          POSTGRES_PASSWORD: openonce
          POSTGRES_DB: openonce_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U openonce"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      OPENONCE_TEST_PG_DSN: host=localhost user=openonce password=openonce dbname=openonce_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run openonce providers --validate-only --require-reviewed
      - run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uvx twine check dist/*
